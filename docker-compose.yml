version: "3.8"

services:
  # Qdrant Vector Database (for RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: saudi_market_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  # Backend API (Rust)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saudi_market_backend
    ports:
      - "3001:3001"
    environment:
      QDRANT_URL: http://qdrant:6333
      RUST_LOG: info
    env_file:
      - ./backend/.env
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - ./documents:/app/documents:ro

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saudi_market_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  qdrant_data:
